<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkLove Cinematic Universe Hangman Game</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 5%;
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5e3c7;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-width: 100vw;
        }

        h1 {
            color: #f390ee;
            font-size: clamp(22px, 5vw, 36px);
            margin-bottom: 1%;
        }

        img {
            width: 70vw;
            /* scales with screen */
            max-width: 300px;
            /* prevents huge scaling */
            height: auto;
            margin: 10px 0;
        }

        #word {
            font-size: clamp(22px, 6vw, 34px);
            letter-spacing: 8px;
            margin: 15px 0;
            word-wrap: break-word;
        }

        #keyboard {
            width: 100vw;
            max-width: 100vw;
            margin-top: 5vh;
        }

        button {
            flex: 1;
            /* evenly spreads keys */
            max-width: 60px;
            /* prevents giant keys */
            padding: 14px 0;
            font-size: clamp(14px, 1.8vw, 20px);
            border: none;
            border-radius: 8px;
            background: #4ac378;
            color: white;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover:not(:disabled) {
            background: #f5dfc6;
        }

        button:disabled {
            background: #f390ee;
            color: #fdda98;
        }

        #message {
            margin-top: 5%;
            font-size: clamp(16px, 4.5vw, 22px);
            font-weight: bold;
            min-height: 10%;
        }

        #restart {
            margin-top: 2%;
            max-height: 8vh;
            font-size: clamp(14px, 4vw, 18px);
            border-radius: 6px;
            border: none;
            background: rgb(246, 127, 30);
            color: white;
            cursor: pointer;
            display: flex;
        }

        #restart .fixed-bottom {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 4vw;
            height: 3vw;
            /* fixed height ratio */

            padding: 0;
            /* remove padding influence */
            font-size: 16px;
            /* stable text size */
            line-height: 2vw;
            /* vertically center text */

            border-radius: 6px;
            display: inline-block;
            white-space: nowrap;
            /* prevents text wrapping */

            z-index: 1000;
        }

        #note {
            margin-top: 5%;
            margin-bottom: 5%;
            font-size: clamp(12px, 2vw, 12px);
            color: #f19e30;
            opacity: 0.8;
        }

        #word {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            font-size: clamp(22px, 6vw, 34px);
            margin: 15px 0;
        }

        .char {
            display: inline-block;
            min-width: 28px;
            text-align: center;
            border-bottom: 2px solid #f7ab1e;
            padding-bottom: 4px;
        }

        .char.hidden {
            color: transparent;
            /* hides text completely */
        }

        .char.revealed {
            color: #000;
        }

        .separator {
            display: inline-block;
            min-width: 20px;
            color: #2db81b;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>
        <font style="color:#4ac378">Hangman</font> (Save MuvMuv)
    </h1>
    <p id="note">note:&ensp;/&ensp;represents word breaks </p>
    <img id="hangmanImage" src="hangman0.png" alt="Hangman">

    <div id="word"></div>

    <div id="keyboard"></div>

    <div id="message"></div>

    <button id="restart" onclick="startGame()">Restart</button>

    <script>
        const words = [
            "milklove",
            "ongsa",
            "sun",
            "earth",
            "23point5",
            "gmmtv",
            "ink",
            "pa",
            "bad buddy",
            "whale store xoxo",
            "professor",
            "tilt",
            "orbit",
            "meawnam",
            "wan",
            "grocery store",
            "shasha",
            "gorya",
            "girl rules",
            "blush blossom",
            "mini heart",
            "mimiv",
            "nong pansa",
            "phi pat",
            "pansa vosbein",
            "love pattranite",
            "chop oongsa mak mak mak mak mak",
            "cha cha cha",
            "sudteerak",
            "shot feel",
            "only champion",
            "cross the line",
            "ditto",
            "dear",
            "rafah",
            "size gap yuri",
            "muvmuv",
            "anyone taller than me is fine",
            "baby tee",
            "magic of zero",
            "vice versa",
            "fanmeet",
            "concert",
            "bobba eyes",
            "samoyed puppy",
            "pa family"
        ];
        const maxWrong = 6;

        let selectedWord = "";
        let guessedLetters = [];
        let wrongAttempts = 0;

        // Image states
        const images = [
            "images/muvmuv.png",
            "images/muvmuv1.png",
            "images/muvmuv2.png",
            "images/muvmuv3.png",
            "images/muvmuv4.png",
            "images/muvmuv5.png",
        ];

        function startGame() {
            selectedWord = words[Math.floor(Math.random() * words.length)];
            guessedLetters = [];
            wrongAttempts = 0;

            document.getElementById("word").innerHTML = "";
            document.getElementById("message").textContent = "";
            document.getElementById("restart").style.display = "none";
            document.getElementById("hangmanImage").src = images[0];

            createKeyboard();
            updateWordDisplay();
        }

        function createKeyboard() {
            const keyboard = document.getElementById("keyboard");
            keyboard.innerHTML = "";

            const rows = [
                "qwertyuiop",
                "asdfghjkl",
                "zxcvbnm"
            ];

            rows.forEach(row => {
                const rowDiv = document.createElement("div");
                rowDiv.style.display = "flex";
                rowDiv.style.justifyContent = "center";
                rowDiv.style.gap = "6px";
                rowDiv.style.marginBottom = "6px";

                row.split("").forEach(letter => {
                    const btn = document.createElement("button");
                    btn.textContent = letter;
                    btn.id = "key-" + letter;
                    btn.onclick = () => handleGuess(letter);
                    rowDiv.appendChild(btn);
                });

                keyboard.appendChild(rowDiv);
            });
        }

        function handleGuess(letter) {

            if (guessedLetters.includes(letter) || wrongAttempts >= maxWrong) return;

            guessedLetters.push(letter);

            const button = document.getElementById("key-" + letter);
            if (button) button.disabled = true;

            if (!selectedWord.includes(letter)) {
                wrongAttempts++;
                document.getElementById("hangmanImage").src = images[wrongAttempts];
            }

            updateWordDisplay();
            checkGameStatus();
        }

        function updateWordDisplay() {
            const container = document.getElementById("word");
            container.innerHTML = "";

            selectedWord.split("").forEach(letter => {
                const span = document.createElement("span");

                if (letter === " ") {
                    span.textContent = "/";
                    span.className = "separator";
                } else if (guessedLetters.includes(letter)) {
                    span.textContent = letter;
                    span.className = "char revealed";
                } else {
                    span.textContent = "";   // 👈 IMPORTANT: no dash anymore
                    span.className = "char hidden";
                }

                container.appendChild(span);
            });
        }
        function checkGameStatus() {
            const won = selectedWord
                .split("")
                .every(letter => {
                    if (letter === " ") return true;
                    return guessedLetters.includes(letter);
                });

            if (won) {
                endGame("You Won!");
            } else if (wrongAttempts >= maxWrong) {
                endGame("Word was: " + selectedWord);
            }
        }

        function endGame(message) {
            document.getElementById("message").innerHTML = message;
            document.getElementById("hangmanImage").src = "images/gameover.png";

            document.querySelectorAll("#keyboard button").forEach(btn => btn.disabled = true);

            const restart = document.getElementById("restart");

            restart.style.display = "inline-block";
            restart.classList.add("fixed-bottom");
        }
        document.addEventListener("keydown", function (event) {
            const key = event.key.toLowerCase();
            if (key.length === 1 && key >= "a" && key <= "z") {
                handleGuess(key);
            }
        });

        startGame();
    </script>

</body>

</html>
